name: MyBusinessIdea

options:
  minimumXcodeGenVersion: 2.40.0
  bundleIdPrefix: com.mybusinessidea
  deploymentTarget:
    iOS: "17.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.8.0

targets:
  MyBusinessIdea:
    type: application
    platform: iOS
    sources:
      - MyBusinessIdea
    resources:
      - MyBusinessIdea/Resources
    info:
      path: MyBusinessIdea/Supporting/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mybusinessidea.ios
        PRODUCT_NAME: MyBusinessIdea
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        INFOPLIST_KEY_CFBundleDisplayName: My Business Idea
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    scheme:
      testTargets: []
